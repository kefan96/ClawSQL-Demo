# ClawSQL Configuration
# MySQL cluster management with AI-powered failover

cluster:
  name: clawsql-demo
  seeds:
    - mysql-primary:3306

mysql:
  user: root
  password: root_pass
  connectionPool: 10
  connectTimeout: 5000

proxysql:
  host: proxysql
  adminPort: 6032
  dataPort: 6033
  user: admin
  password: admin_pass
  hostgroups:
    writer: 10
    reader: 20

failover:
  enabled: true
  autoFailover: false
  failoverTimeout: 30
  recoveryTimeout: 60
  minReplicas: 1
  maxLagSeconds: 5

ai:
  provider: anthropic
  apiKey: ${ANTHROPIC_API_KEY}
  baseURL: ${ANTHROPIC_BASE_URL}  # Optional: for DashScope, Azure, etc.
  model: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}  # Use ANTHROPIC_MODEL env var or default
  features:
    analysis: true
    recommendations: true
    naturalLanguage: true

sql:
  enabled: true
  readOnlyByDefault: true
  maxRows: 1000
  timeout: 30000
  allowDDL: false

memory:
  enabled: true
  storagePath: ./data/memory
  schemaSyncInterval: 3600000  # 1 hour in milliseconds
  maxQueryHistory: 1000
  feedbackLearning: true
  confirmationThreshold: 0.8

scheduler:
  topologyPollInterval: 5000
  healthCheckInterval: 3000
  replicationMonitorInterval: 2000

webhooks:
  enabled: true
  secret: ${WEBHOOK_SECRET}
  endpoints: []

api:
  port: 8080
  host: 0.0.0.0

logging:
  level: info
  format: json