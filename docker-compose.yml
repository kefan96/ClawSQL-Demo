version: "3.8"

# ═══════════════════════════════════════════════════════
#  ClawSQL Demo — MySQL Cluster + ProxySQL
#
#  Architecture:
#    ClawSQL Service ──► ProxySQL ──► MySQL Primary/Replicas
# ═══════════════════════════════════════════════════════

services:

  # ─── MySQL Primary ───
  mysql-primary:
    image: mysql:8.0
    container_name: clawsql-primary
    hostname: mysql-primary
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - ./config/mysql/primary.cnf:/etc/mysql/conf.d/clawsql.cnf
      - ./config/mysql/init-primary.sql:/docker-entrypoint-initdb.d/01-init.sql
      - primary_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - clawsql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ─── MySQL Replica 1 ───
  mysql-replica-1:
    image: mysql:8.0
    container_name: clawsql-replica-1
    hostname: mysql-replica-1
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - ./config/mysql/replica.cnf:/etc/mysql/conf.d/clawsql.cnf
      - replica1_data:/var/lib/mysql
    ports:
      - "3308:3306"
    depends_on:
      mysql-primary:
        condition: service_healthy
    networks:
      - clawsql

  # ─── MySQL Replica 2 ───
  mysql-replica-2:
    image: mysql:8.0
    container_name: clawsql-replica-2
    hostname: mysql-replica-2
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - ./config/mysql/replica.cnf:/etc/mysql/conf.d/clawsql.cnf
      - replica2_data:/var/lib/mysql
    command: --server-id=202 --report-host=mysql-replica-2
    ports:
      - "3309:3306"
    depends_on:
      mysql-primary:
        condition: service_healthy
    networks:
      - clawsql

  # ─── ProxySQL ───
  proxysql:
    image: proxysql/proxysql:2.6.3
    container_name: clawsql-proxysql
    hostname: proxysql
    volumes:
      - proxysql_data:/var/lib/proxysql
    ports:
      - "6033:6033"
      - "6032:6032"
    depends_on:
      mysql-primary:
        condition: service_healthy
    networks:
      - clawsql

volumes:
  primary_data:
  replica1_data:
  replica2_data:
  proxysql_data:

networks:
  clawsql:
    driver: bridge