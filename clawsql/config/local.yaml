# ClawSQL Configuration for Local Testing
# Use when running from host (outside Docker network)

cluster:
  name: clawsql-demo
  seeds:
    - localhost:3307

mysql:
  user: root
  password: root_pass
  connectionPool: 10
  connectTimeout: 5000

proxysql:
  host: localhost
  adminPort: 6032
  dataPort: 6033
  user: admin
  password: admin_pass
  hostgroups:
    writer: 10
    reader: 20

failover:
  enabled: true
  autoFailover: false
  failoverTimeout: 30
  recoveryTimeout: 60
  minReplicas: 1
  maxLagSeconds: 5

ai:
  provider: anthropic
  apiKey: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6
  features:
    analysis: true
    recommendations: true
    naturalLanguage: true

scheduler:
  topologyPollInterval: 5000
  healthCheckInterval: 3000
  replicationMonitorInterval: 2000

webhooks:
  enabled: false
  secret: ${WEBHOOK_SECRET}
  endpoints: []

api:
  port: 8080
  host: 0.0.0.0

logging:
  level: info
  format: json